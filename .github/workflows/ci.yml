name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libzstd-dev

      - name: Build (release)
        run: make -j$(nproc)

      - name: Check binary size
        run: |
          ls -lh omniagent
          size omniagent

      - name: Build (debug / sanitisers)
        run: make debug

      - name: Verify binary runs
        run: |
          # Quick smoke test: start without Loki (metrics only), wait 3 s,
          # check /metrics endpoint returns data, then shut down cleanly.
          # Loki is not available on CI runners so disable log push.
          OAGENT_ENABLE_LOGS=0 OAGENT_ENABLE_OTLP=0 \
            sudo -E timeout 15 ./omniagent -m 19100 -i 1 &
          AGENT_PID=$!
          sleep 4
          LINES=$(curl -sf http://localhost:19100/metrics 2>/dev/null | grep -c '^omniagent_' || echo 0)
          sudo kill $AGENT_PID 2>/dev/null || true
          wait $AGENT_PID 2>/dev/null || true
          echo "Metric lines returned: $LINES"
          [ "$LINES" -gt 0 ] || { echo "FAIL: no metrics from /metrics endpoint"; exit 1; }
          echo "OK: smoke test passed"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniagent-${{ matrix.os }}
          path: omniagent
          retention-days: 7

  lint:
    name: Static analysis
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libzstd-dev cppcheck

      - name: cppcheck
        run: |
          cppcheck \
            --std=c11 \
            --enable=warning,portability,performance \
            --suppress=missingIncludeSystem \
            --suppress=uninitvar \
            --error-exitcode=1 \
            -I include/ \
            src/
