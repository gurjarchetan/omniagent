name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libzstd-dev

      - name: Build (release)
        run: make -j$(nproc)

      - name: Check binary size
        run: |
          ls -lh omniagent
          size omniagent

      - name: Build (debug / sanitisers)
        run: make debug

      - name: Verify binary runs
        run: |
          # Smoke test: start with metrics only (no Loki needed), poll
          # /metrics for up to 10 s, fail only if we get nothing.
          OAGENT_ENABLE_LOGS=0 OAGENT_ENABLE_OTLP=0 \
            sudo -E ./omniagent -m 19100 -i 1 &
          AGENT_PID=$!
          for i in $(seq 1 10); do
            sleep 1
            LINES=$(curl -sf http://localhost:19100/metrics 2>/dev/null \
                    | grep -c '^omniagent_' 2>/dev/null || true)
            if [ "${LINES:-0}" -gt 0 ]; then
              echo "OK: $LINES metric lines after ${i}s"
              sudo kill $AGENT_PID 2>/dev/null || true
              wait $AGENT_PID 2>/dev/null || true
              exit 0
            fi
          done
          sudo kill $AGENT_PID 2>/dev/null || true
          echo "FAIL: /metrics returned no data after 10s"
          exit 1

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniagent-${{ matrix.os }}
          path: omniagent
          retention-days: 7

  lint:
    name: Static analysis
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libzstd-dev cppcheck

      - name: cppcheck
        run: |
          cppcheck \
            --std=c11 \
            --enable=warning,portability,performance \
            --suppress=missingIncludeSystem \
            --suppress=uninitvar \
            --suppress=constStatement \
            --error-exitcode=1 \
            -I include/ \
            src/
